spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wordflip?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8mb4
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

wordflip:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: wordflip
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
      - http://10.0.2.2:8080

logging:
  level:
    com.wordflip: DEBUG
    org.springframework.security: INFO
