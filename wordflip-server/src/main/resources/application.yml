spring:
  application:
    name: wordflip-server
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

wordflip:
  jwt:
    secret: ${WORDFLIP_JWT_SECRET:dev-only-change-me-wordflip-jwt-secret-key-32bytes!!}
    access-expiration-minutes: 15
    refresh-expiration-days: 7
  minio:
    bucket: wordflip
