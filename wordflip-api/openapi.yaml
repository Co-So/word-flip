openapi: 3.0.3
info:
  title: WordFlip API
  version: 2.0.0
  description: |
    WordFlip 词书学习卡应用 REST API。

    **业务文档：** [requirements.md](../docs/wordflip/requirements.md) · [api-modules.md](../docs/wordflip/api-modules.md) · [plans/lexicon-restructure.md](../docs/wordflip/plans/lexicon-restructure.md)

    **核心规则：**
    - 用户一次只有一本当前主词书；切换词书通过学习计划完成，历史计划保留
    - 学习、分组、今日任务与测验均以 `cardId` 为单位，同时返回 `lexemeId`
    - 每本词书独立维护考义；默认展示当前词书学习卡，ECDICT/WordNet 仅作为可展开资料来源
    - **skill 双轨：** `dictation` / `choice` 各自维护权威 FSRS 状态
    - 答错映射 FSRS `Again`，答对映射 `Good`；浏览和翻卡不写入记忆状态
    - `card_skill_memory` 是调度依据；`lexeme_skill_memory` 仅记录跨词书词形熟悉度，不能直接将新卡标记为掌握
    - **时区：** 服务端存 UTC；「当日」由 `X-Timezone` 请求头（缺省 `Asia/Shanghai`）或用户 profile 决定
    - **已掌握统计：** `stability >= 80` 且最近测验成功且建议间隔 ≥ 30 天（REQ-EBBING-7）
    - **学习完成度：** `round(masteredCount / 已入组总词数 × 100)`，已入组总词数为 0 时返回 0

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Auth
    description: 注册、登录、Token
  - name: Settings
    description: 用户显示与测验偏好
  - name: LearningPlans
    description: 当前主词书与历史学习计划
  - name: Books
    description: 词书列表与导入
  - name: Words
    description: 单词池（未入组）
  - name: Groups
    description: 学习分组
  - name: Study
    description: 卡片学习
  - name: Today
    description: 今日首页
  - name: Quiz
    description: 测验（默写/选择；掌握度按 skill 写入口）
  - name: Images
    description: 卡拍图片
  - name: Stains
    description: 卡片污渍
  - name: Stats
    description: 统计与成就

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 注册
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功并登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: 账号已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: 账号或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新 Access Token
      description: 每次刷新签发新 refreshToken，旧 refreshToken 从 Redis 吊销。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: 登出
      description: 提供 refreshToken 时仅吊销该设备会话；省略时吊销该用户全部 refresh token。
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '204':
          description: 已登出

  /settings:
    get:
      tags: [Settings]
      summary: 获取用户偏好与当前学习计划标识
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'

  /settings/preferences:
    patch:
      tags: [Settings]
      summary: 更新用户偏好（不触发分组追加）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferencesPatchRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'

  /books:
    get:
      tags: [Books]
      summary: 词书列表
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookListResponse'

  /books/import/preview:
    post:
      tags: [Books]
      summary: 导入预览（解析文件）
      description: |
        支持 JSON / CSV / TXT（REQ-BOOK-6）。服务端解析后暂存结果并返回 `previewToken`（TTL 15 分钟，confirm 后作废）。
        同书内重复 `en` 去重；无效行跳过。单文件上限 5MB。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookImportPreviewResponse'
        '413':
          description: 文件过大
        '422':
          description: 解析失败或无有效单词
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: 导入频率超限

  /books/import:
    post:
      tags: [Books]
      summary: 确认导入词书
      description: |
        使用 preview 阶段返回的 token 确认入库。成功后自动勾选该书（`selected=true`），并清除 `user_book_selection` 中对该书的旧勾选冲突。
        不自动追加分组，需用户再 `PUT /settings` 触发 append。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookImportConfirmRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookImportConfirmResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          description: previewToken 无效
        '410':
          description: previewToken 已过期
        '409':
          description: 同名 imported 词书冲突
        '429':
          description: 导入频率超限

  /books/{bookId}:
    get:
      tags: [Books]
      summary: 词书详情
      description: |
        返回单本可见词书（builtin 全员可见，或当前用户的 imported）。
        仅浏览元数据，不改变勾选与分组。
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookItem'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Books]
      summary: 删除导入词书
      description: 仅 `source=imported` 且归属当前用户。删除后从用户勾选列表移除；已入组单词保留。
      parameters:
        - $ref: '#/components/parameters/BookId'
      responses:
        '204':
          description: 已删除
        '403':
          description: 内置词书不可删
        '404':
          $ref: '#/components/responses/NotFound'

  /books/{bookId}/cards:
    get:
      tags: [Books]
      summary: 词书学习卡分页
      description: |
        按词书顺序返回当前已发布学习卡。未发布和待补充条目不进入学习或测验池。
      parameters:
        - $ref: '#/components/parameters/BookId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookCardsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /learning/cards/unassigned:
    get:
      tags: [Study]
      summary: 当前计划未入组学习卡池
      description: |
        当前学习计划中已发布、但不在任何 study_group_cards 中的卡片。待审核卡片不会返回。
        `all=true` 时返回全量（上限 5000，不分页）；否则分页，默认 size=20。
      parameters:
        - name: all
          in: query
          schema:
            type: boolean
            default: false
        - name: q
          in: query
          description: 按词头或词书考义前缀搜索（可选）
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnassignedCardsResponse'

  /learning-plans:
    post:
      tags: [LearningPlans]
      summary: 创建并激活学习计划
      description: 为指定词书创建计划并原子切换为唯一当前计划；原计划保留历史。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearningPlanRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPlan'

  /learning-plans/current:
    get:
      tags: [LearningPlans]
      summary: 获取当前学习计划
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPlan'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [LearningPlans]
      summary: 切换或调整当前学习计划
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchLearningPlanRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningPlan'

  /learning/cards/{cardId}:
    get:
      tags: [Study]
      summary: 获取学习卡详情
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LearningCardDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /words/{wordKey}:
    get:
      tags: [Words]
      summary: 查询当前词书学习卡与来源资料
      description: |
        返回当前计划所属词书的学习卡，并按来源分组返回 ECDICT、WordNet 等资料。
        来源资料仅供详情展示，不改变学习卡考义或 FSRS 进度。
      parameters:
        - $ref: '#/components/parameters/WordKey'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordLookupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups:
    get:
      tags: [Groups]
      summary: 分组列表
      parameters:
        - name: source
          in: query
          schema:
            type: string
            enum: [auto, custom]
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAt, name]
            default: createdAt
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'

  /groups/custom:
    post:
      tags: [Groups]
      summary: 创建自定义分组
      description: |
        `cardIds` 须来自当前计划的未入组卡片池（`GET /learning/cards/unassigned`）。
        一张学习卡在同一计划内只能属于一个分组；已入组卡片返回 409。
        服务端对重复 cardId 去重；空数组或全部非法返回 400。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomGroupRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDetail'
        '409':
          description: cardId 已入组或不属于当前计划
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /groups/{groupId}:
    get:
      tags: [Groups]
      summary: 分组详情
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /groups/{groupId}/cards:
    get:
      tags: [Groups]
      summary: 分组学习卡列表（只读 FSRS 进度）
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupCardsResponse'

  /groups/{groupId}/stains/batch:
    post:
      tags: [Stains]
      summary: 一键为分组内所有词生成污渍
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StainBatchRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StainBatchResponse'

  /today:
    get:
      tags: [Today]
      summary: 今日仪表盘
      description: |
        仅统计当前学习计划。新卡来自当前计划已入组且尚无有效测验记录的学习卡；
        到期复习与测验排序以 `card_skill_memory.due_at` 为准，默写和选择技能分别计算。
      parameters:
        - name: X-Timezone
          in: header
          schema:
            type: string
            example: Asia/Shanghai
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayDashboard'

  /study/groups/{groupId}:
    get:
      tags: [Study]
      summary: 学习页卡片数据
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudyGroupPayload'

  /study/sessions:
    post:
      tags: [Study]
      summary: 上报学习 session 结束
      description: 用于 study_logs、热力图与打卡；翻转浏览本身不改变掌握度。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudySessionReportRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudySessionReportResponse'

  /quiz/sessions:
    post:
      tags: [Quiz]
      summary: 创建测验会话
      description: |
        每次进入测验页必须新建 session。题目只来自当前计划已发布且已入组的学习卡。
        到期判断使用对应技能的 `card_skill_memory.due_at`；`study` 可按 `groupId` 过滤。
        实际出题数 = `min(|pool|, questionLimit)`，默认 limit=10。
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuizSessionRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizSessionCreated'
        '422':
          description: 无题可出
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /quiz/sessions/{sessionId}/answer:
    post:
      tags: [Quiz]
      summary: 提交单题答案（掌握度唯一写入口）
      description: |
        服务端判题；答对映射 FSRS `Good`，答错映射 `Again`，客户端不得提交 rating。
        `requestId` 是提交幂等键，网络重试必须复用同一 UUID。
        同一事务写答案、`review_events`、卡片技能记忆与词形熟悉度；默写和选择技能相互隔离。
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerResult'
        '409':
          description: 会话已完成，或 requestId 与既有请求载荷冲突
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /quiz/sessions/{sessionId}/result:
    get:
      tags: [Quiz]
      summary: 测验结果页
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResult'

  /learning/cards/{cardId}/image:
    get:
      tags: [Images]
      summary: 获取卡片图片
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordImageResponse'
        '404':
          description: 无图片
    post:
      tags: [Images]
      summary: 上传或替换卡片图片
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, transform]
              properties:
                file:
                  type: string
                  format: binary
                transform:
                  type: string
                  description: ImageTransform JSON 字符串
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordImageResponse'
    patch:
      tags: [Images]
      summary: 仅更新图片 transform（不重传文件）
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageTransform'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordImageResponse'
    delete:
      tags: [Images]
      summary: 清除卡片图片
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '204':
          description: 已清除

  /learning/cards/{cardId}/stain:
    get:
      tags: [Stains]
      summary: 获取污渍配置
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordStainResponse'
    put:
      tags: [Stains]
      summary: 更新污渍
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StainUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WordStainResponse'

  /stats/summary:
    get:
      tags: [Stats]
      summary: 统计四宫格
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsSummary'

  /stats/heatmap:
    get:
      tags: [Stats]
      summary: 近 N 个月学习热力图
      parameters:
        - name: months
          in: query
          schema:
            type: integer
            default: 3
            minimum: 1
            maximum: 12
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsHeatmap'

  /stats/achievements:
    get:
      tags: [Stats]
      summary: 成就列表
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementsResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CardId:
      name: cardId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BookId:
      name: bookId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    WordKey:
      name: wordKey
      in: path
      required: true
      schema:
        type: string
      description: en.trim().toLowerCase()，需 URL 编码
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    ValidationError:
      description: 参数校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 未认证或 Token 无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [code, message, timestamp]
      properties:
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        details:
          type: object
          additionalProperties: true

    PageMeta:
      type: object
      required: [page, size, totalElements, totalPages]
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    MasteryLevel:
      type: string
      enum: [unlearned, fuzzy, unknown]
      description: |
        队列/薄弱三态（组详情主展示为 stability 热力，非本字段）：
        unlearned — 未测验新词，或测验答对后在 SRS 在档（见 hasQuizHistory）
        fuzzy — 最近一次测验答错（非连续第 2 次）
        unknown — 同一 wordKey+skill 跨 session 连续 2 次测验答错

    Skill:
      type: string
      enum: [dictation, choice]
      description: 题型技能；默写与选择各一套热力/SRS

    HeatDisplayMode:
      type: string
      enum: [combined, dictation, choice, free]
      description: |
        组详情热力展示：combined 取两 skill 较低档；dictation/choice 单轨；
        free 由客户端切换（服务端默认按 combined 聚合）

    QuizLaunchMode:
      type: string
      enum: [mixed, free_select]
      description: mixed 混合直开；free_select 开测前选题型与题数

    QuestionType:
      type: string
      enum: [dictation, choice_en_cn, choice_cn_en]
      description: |
        dictation → Skill.dictation；
        choice_en_cn / choice_cn_en → Skill.choice

    MasterySnapshot:
      type: object
      required: [level, hasQuizHistory, stability, heatLevel, skill]
      properties:
        level:
          $ref: '#/components/schemas/MasteryLevel'
        stage:
          type: integer
          minimum: 0
          maximum: 5
          description: 无该 skill 进度记录时省略或为 0
        nextReviewAt:
          type: string
          format: date
          nullable: true
          description: 无计划时为 null
        hasQuizHistory:
          type: boolean
          description: 该 skill 首次提交测验答案后为 true；用于区分「新词未测验」与「答对后在 SRS 在档的 unlearned」
        stability:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: 该 skill 稳定性权值 S（0.00–100.00）；仅测验写入
        heatLevel:
          type: integer
          minimum: 0
          maximum: 4
          description: |
            由 stability 映射：0(0–9.9) 1(10–29.9) 2(30–54.9) 3(55–79.9) 4(80–100)
        skill:
          $ref: '#/components/schemas/Skill'

    WordProgressSnapshot:
      type: object
      required: [dictation, choice, displayHeatLevel, displayStability, heatDisplayMode]
      properties:
        dictation:
          $ref: '#/components/schemas/MasterySnapshot'
        choice:
          $ref: '#/components/schemas/MasterySnapshot'
        displayHeatLevel:
          type: integer
          minimum: 0
          maximum: 4
          description: 按 heatDisplayMode 聚合后的展示热力档
        displayStability:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: 按 heatDisplayMode 聚合后的展示 S
        heatDisplayMode:
          $ref: '#/components/schemas/HeatDisplayMode'

    WordSummary:
      type: object
      required: [lexemeId, wordKey, en]
      description: 规范词形摘要；不承载跨词书共享考义。
      properties:
        lexemeId:
          type: integer
          format: int64
        wordKey:
          type: string
          description: en.trim().toLowerCase()
        en:
          type: string
          description: 英文词头
        cn:
          type: string
          nullable: true
          description: 展示义中文（英英可空）
        pos:
          type: string
          nullable: true
          description: primary 词性
        ph:
          type: string
          nullable: true
          description: 词头音标
        enGloss:
          type: string
          nullable: true
          description: 英英展示义（WordNet）
        senses:
          type: array
          description: 全部义项（详情抽屉）；缺省时客户端仅用顶层字段
          items:
            $ref: '#/components/schemas/Sense'

    WordLookupResponse:
      type: object
      required: [lexemeId, wordKey, en, currentCard, sourceMaterials]
      description: 当前词书学习卡与可展开的词典来源资料。
      properties:
        lexemeId:
          type: integer
          format: int64
        wordKey:
          type: string
          description: en.trim().toLowerCase()
        en:
          type: string
          description: 英文词头
        currentCard:
          $ref: '#/components/schemas/LearningCard'
        sourceMaterials:
          type: array
          items:
            $ref: '#/components/schemas/SourceMaterial'

    Sense:
      type: object
      description: 义项；英汉填 cn，英英填 enGloss（可同时存在）
      properties:
        id:
          type: integer
          format: int64
          nullable: true
          description: dict_senses.id
        pos:
          type: string
          nullable: true
        cn:
          type: string
          nullable: true
          description: 纯中文释义
        enGloss:
          type: string
          nullable: true
          description: 英英释义（REQ-LEX-10）
        primary:
          type: boolean
          default: false
        quality:
          type: string
          enum: [ok, uncertain, reject]
          default: ok
        sortOrder:
          type: integer
          minimum: 0
          default: 0
        examples:
          type: array
          items:
            $ref: '#/components/schemas/Example'

    SourceMaterial:
      type: object
      required: [sourceId, sourceName, revision, senses]
      description: 可追溯到具体来源修订和原始词条的详情资料。
      properties:
        sourceId:
          type: string
        sourceName:
          type: string
        revision:
          type: string
        licenseNote:
          type: string
          nullable: true
        rawEntryId:
          type: integer
          format: int64
          nullable: true
        senses:
          type: array
          items:
            $ref: '#/components/schemas/Sense'

    Example:
      type: object
      required: [en]
      description: 挂在义项下的例句
      properties:
        en:
          type: string
          description: 英文例句
        cn:
          type: string
          nullable: true
          description: 中文翻译
        sortOrder:
          type: integer
          minimum: 0
          default: 0

    ImageTransform:
      type: object
      properties:
        rotate:
          type: number
          default: 0
        scale:
          type: number
          minimum: 0.2
          maximum: 3
          default: 1
        offsetX:
          type: number
          default: 0
        offsetY:
          type: number
          default: 0
        showCn:
          type: boolean
          default: true
        filters:
          type: object
          properties:
            brightness:
              type: number
            contrast:
              type: number
            saturate:
              type: number
            grayscale:
              type: number
            sepia:
              type: number

    StainConfig:
      type: object
      properties:
        seed:
          type: integer
          format: int64
        mode:
          type: string
          enum: [random, single, multi]
        density:
          type: integer
        aging:
          type: integer
        stains:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [coffee, ink, highlight, crayon, random-line]
              x:
                type: number
              y:
                type: number
              size:
                type: number
              rotation:
                type: number
              intensity:
                type: number
              seed:
                type: integer
              layerOrder:
                type: integer

    LearningCard:
      type: object
      required: [cardId, lexemeId, bookId, wordKey, en, version, senses]
      description: 词书专属考义学习卡；同一 lexeme 在不同词书中拥有不同卡片。
      properties:
        cardId:
          type: integer
          format: int64
        lexemeId:
          type: integer
          format: int64
        bookId:
          type: integer
          format: int64
        wordKey:
          type: string
        en:
          type: string
        phonetic:
          type: string
          nullable: true
        version:
          type: integer
          minimum: 1
        senses:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Sense'

    LearningCardDetail:
      allOf:
        - $ref: '#/components/schemas/LearningCard'
        - type: object
          required: [progress, sourceMaterials]
          properties:
            progress:
              $ref: '#/components/schemas/CardProgress'
            sourceMaterials:
              type: array
              items:
                $ref: '#/components/schemas/SourceMaterial'
            image:
              $ref: '#/components/schemas/WordImagePayload'
            stain:
              $ref: '#/components/schemas/WordStainPayload'

    CardProgress:
      type: object
      required: [dictation, choice, displayHeatLevel]
      properties:
        dictation:
          $ref: '#/components/schemas/FsrsMemory'
        choice:
          $ref: '#/components/schemas/FsrsMemory'
        displayHeatLevel:
          type: integer
          minimum: 0
          maximum: 4
          description: 服务端根据默写轨稳定性计算的只读展示热力档

    FsrsMemory:
      type: object
      required: [state, dueAt, stability, difficulty, reps, lapses]
      properties:
        state:
          type: string
          enum: [new, learning, review, relearning]
        dueAt:
          type: string
          format: date-time
        stability:
          type: number
          format: double
        difficulty:
          type: number
          format: double
        reps:
          type: integer
        lapses:
          type: integer

    WordImagePayload:
      type: object
      properties:
        hasImage:
          type: boolean
        imageUrl:
          type: string
          format: uri
          nullable: true
        transform:
          $ref: '#/components/schemas/ImageTransform'

    WordStainPayload:
      type: object
      properties:
        hidden:
          type: boolean
        config:
          $ref: '#/components/schemas/StainConfig'
          nullable: true

    RegisterRequest:
      oneOf:
        - type: object
          required: [email, password]
          properties:
            email:
              type: string
              format: email
            password:
              type: string
              minLength: 8
        - type: object
          required: [phone, password]
          properties:
            phone:
              type: string
              pattern: '^\+[1-9]\d{1,14}$'
              description: E.164 格式
            password:
              type: string
              minLength: 8
      description: 邮箱或手机号二选一注册

    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
          description: 邮箱或手机号，自动识别
        password:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access Token 秒数
        user:
          type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
            email:
              type: string
              nullable: true
            phone:
              type: string
              nullable: true

    GroupSize:
      type: integer
      enum: [10, 20, 30, 50]

    GroupStrategy:
      type: string
      enum: [book_order, frequency, random]
      default: book_order
      description: |
        自动分组策略（REQ-BOOK-22~24）：
        book_order 按词书勾选顺序合并去重；
        frequency 按 word_freq_ranks 全局词频升序（无 rank 词排末尾，保持 book_order 相对序）；
        random 基于 userId+bookIds 稳定随机。

    ThemeMode:
      type: string
      enum: [system, light, dark]

    UserSettingsResponse:
      type: object
      required: [activePlanId, groupSize, groupStrategy, autoSpeak, themeMode]
      properties:
        activePlanId:
          type: integer
          format: int64
          nullable: true
        groupSize:
          $ref: '#/components/schemas/GroupSize'
        groupStrategy:
          $ref: '#/components/schemas/GroupStrategy'
        autoSpeak:
          type: boolean
        themeMode:
          $ref: '#/components/schemas/ThemeMode'
        heatDisplayMode:
          $ref: '#/components/schemas/HeatDisplayMode'
        quizLaunchMode:
          $ref: '#/components/schemas/QuizLaunchMode'
        defaultQuestionLimit:
          type: integer
          minimum: 1
          maximum: 50
          description: 默认测验题数

    PreferencesPatchRequest:
      type: object
      minProperties: 1
      properties:
        autoSpeak:
          type: boolean
        themeMode:
          $ref: '#/components/schemas/ThemeMode'
        heatDisplayMode:
          $ref: '#/components/schemas/HeatDisplayMode'
        quizLaunchMode:
          $ref: '#/components/schemas/QuizLaunchMode'
        defaultQuestionLimit:
          type: integer
          minimum: 1
          maximum: 50

    CreateLearningPlanRequest:
      type: object
      required: [bookId]
      properties:
        bookId:
          type: integer
          format: int64
        dailyNewCardLimit:
          type: integer
          minimum: 1
          maximum: 200
          default: 20

    PatchLearningPlanRequest:
      type: object
      minProperties: 1
      properties:
        planId:
          type: integer
          format: int64
          description: 切换到已有历史计划
        dailyNewCardLimit:
          type: integer
          minimum: 1
          maximum: 200
        status:
          type: string
          enum: [active, paused, completed]

    LearningPlan:
      type: object
      required: [planId, bookId, bookName, status, dailyNewCardLimit, active, createdAt]
      properties:
        planId:
          type: integer
          format: int64
        bookId:
          type: integer
          format: int64
        bookName:
          type: string
        status:
          type: string
          enum: [active, paused, completed]
        dailyNewCardLimit:
          type: integer
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    BookListResponse:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: '#/components/schemas/BookItem'

    BookItem:
      type: object
      required: [id, name, source, wordCount, selected, canDelete]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        source:
          type: string
          enum: [builtin, imported]
        wordCount:
          type: integer
        declaredCount:
          type: integer
          nullable: true
        selected:
          type: boolean
        canDelete:
          type: boolean

    BookImportPreviewResponse:
      type: object
      required: [previewToken, suggestedName, totalCount, previewWords]
      properties:
        previewToken:
          type: string
          format: uuid
          description: 服务端暂存解析结果，TTL 15 分钟
        suggestedName:
          type: string
        totalCount:
          type: integer
          description: 去重后有效词数
        deduplicatedCount:
          type: integer
          description: 同文件内被去重的重复行数
        previewWords:
          type: array
          maxItems: 6
          items:
            $ref: '#/components/schemas/WordSummary'

    BookImportConfirmRequest:
      type: object
      required: [previewToken, name]
      properties:
        previewToken:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 64

    BookImportConfirmResponse:
      type: object
      required: [book]
      properties:
        book:
          $ref: '#/components/schemas/BookItem'
          description: confirm 后 selected=true

    BookCardsResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [cards]
          properties:
            cards:
              type: array
              items:
                $ref: '#/components/schemas/LearningCard'

    UnassignedCardsResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            cards:
              type: array
              items:
                $ref: '#/components/schemas/LearningCard'

    GroupStats:
      type: object
      required: [heat0, heat1, heat2, heat3, heat4, total]
      description: 组内单词按 heatLevel 分档计数（REQ-GROUP-2）
      properties:
        heat0:
          type: integer
          description: heatLevel=0（新词/未巩固）
        heat1:
          type: integer
        heat2:
          type: integer
        heat3:
          type: integer
        heat4:
          type: integer
          description: heatLevel=4（很熟 / 接近已掌握）
        total:
          type: integer

    GroupDetail:
      type: object
      required: [id, name, source, status, stats, progress]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        source:
          type: string
          enum: [auto, custom]
        status:
          type: string
          enum: [not_started, learning, completed]
        createdAt:
          type: string
          format: date-time
        stats:
          $ref: '#/components/schemas/GroupStats'
        progress:
          type: number
          format: float
          description: 已掌握占比 = count(stability >= 80) / total（REQ-GROUP-2）

    GroupListResponse:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupDetail'

    GroupCardsResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            cards:
              type: array
              items:
                $ref: '#/components/schemas/LearningCardDetail'

    CreateCustomGroupRequest:
      type: object
      required: [cardIds]
      properties:
        cardIds:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: integer
            format: int64
        name:
          type: string
          maxLength: 64
          description: 可选；默认「自定义分组 {序号}」

    TodayTask:
      type: object
      required: [count, label]
      properties:
        count:
          type: integer
          description: 待办规模（新词/到期/测验池大小）
        label:
          type: string
        sources:
          type: array
          items:
            type: object
            properties:
              groupId:
                type: integer
              groupName:
                type: string
              count:
                type: integer

    TodayDashboard:
      type: object
      required: [date, streakDays, stats, tasks]
      properties:
        date:
          type: string
          format: date
        streakDays:
          type: integer
        stats:
          type: object
          required: [masteredCount, dueReviewCount, completionPercent]
          properties:
            masteredCount:
              type: integer
              description: stability>=80 且最近测验成功且建议间隔≥30 天（REQ-EBBING-7）
            dueReviewCount:
              type: integer
              description: 与 tasks.dueReview.count 一致
            completionPercent:
              type: integer
              minimum: 0
              maximum: 100
              description: round(masteredCount / 已入组总词数 × 100)
        tasks:
          type: object
          properties:
            newWords:
              $ref: '#/components/schemas/TodayTask'
            dueReview:
              $ref: '#/components/schemas/TodayTask'
            quiz:
              $ref: '#/components/schemas/TodayTask'
        recommendedStudy:
          type: object
          properties:
            groupId:
              type: integer
            groupName:
              type: string
            wordCount:
              type: integer
            reason:
              type: string
              enum: [new_words, due_review, mixed]
        recentGroups:
          type: array
          maxItems: 3
          description: 最近学习/测验的分组（最多 3）
          items:
            type: object
            required: [groupId, name, lastStudiedAt]
            properties:
              groupId:
                type: integer
                format: int64
              name:
                type: string
              lastStudiedAt:
                type: string
                format: date-time

    StudyGroupPayload:
      type: object
      required: [group, cards]
      properties:
        group:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            source:
              type: string
        cards:
          type: array
          items:
            $ref: '#/components/schemas/LearningCard'

    StudySessionReportRequest:
      type: object
      required: [groupId]
      properties:
        groupId:
          type: integer
        durationSec:
          type: integer
        cardsViewed:
          type: integer
        completedAt:
          type: string
          format: date-time

    StudySessionReportResponse:
      type: object
      properties:
        logDate:
          type: string
          format: date
        streakDays:
          type: integer

    CreateQuizSessionRequest:
      type: object
      properties:
        source:
          type: string
          enum: [today, study, retry, groups, all, recent, diagnostic]
          default: today
          description: |
            today/study/retry 沿用原入口；
            groups 按 groupIds（或单 groupId）抽题；
            all 为当前计划全部已入组卡片；recent 为最近学习组；
            diagnostic 仅选择跨书词形已熟悉、但当前卡片尚未建立 FSRS 进度的卡片。
        groupId:
          type: integer
          format: int64
          nullable: true
          description: 单组测验；与 groupIds 二选一或并存时以 groupIds 为准
        groupIds:
          type: array
          items:
            type: integer
            format: int64
          description: 多组测验（source=groups）
        questionLimit:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        questionTypes:
          type: array
          items:
            $ref: '#/components/schemas/QuestionType'
          description: 本场题型；省略时按 quizLaunchMode / 默认 dictation
        launchMode:
          $ref: '#/components/schemas/QuizLaunchMode'

    QuizQuestion:
      type: object
      required: [questionIndex, cardId, lexemeId, type, prompt]
      properties:
        questionIndex:
          type: integer
        cardId:
          type: integer
          format: int64
        lexemeId:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/QuestionType'
        prompt:
          type: object
          properties:
            cn:
              type: string
            pos:
              type: string
            ph:
              type: string
            en:
              type: string
              description: choice_en_cn（英→中）题干英文；其余题型可省略
        options:
          type: array
          nullable: true
          description: 选择题选项；dictation 为 null/省略
          items:
            type: object
            required: [key, label]
            properties:
              key:
                type: string
              label:
                type: string

    QuizSessionCreated:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [in_progress]
        totalQuestions:
          type: integer
        currentIndex:
          type: integer
        score:
          type: integer
        question:
          $ref: '#/components/schemas/QuizQuestion'

    SubmitAnswerRequest:
      type: object
      required: [requestId, questionIndex]
      properties:
        requestId:
          type: string
          format: uuid
          description: 客户端生成的稳定幂等键；重试同一答案时必须复用。
        questionIndex:
          type: integer
        answer:
          type: string
          description: 默写题用户输入；选择题可省略
        selectedKey:
          type: string
          description: 选择题选中选项 key；默写题可省略

    AnswerResult:
      type: object
      required: [correct, feedback, session]
      properties:
        correct:
          type: boolean
        expectedEn:
          type: string
          nullable: true
          description: 答错时返回英文标准答案（巩固默写用）
        expectedAnswer:
          type: string
          nullable: true
          description: |
            答错时按题型展示的正确答案文案：
            choice_en_cn 为清洗后的中文释义；dictation / choice_cn_en 为英文。
        feedback:
          type: string
          enum: [correct, wrong]
        masteryUpdate:
          type: object
          required: [cardId, lexemeId, before, after]
          properties:
            cardId:
              type: integer
              format: int64
            lexemeId:
              type: integer
              format: int64
            before:
              $ref: '#/components/schemas/FsrsMemory'
            after:
              $ref: '#/components/schemas/FsrsMemory'
        session:
          type: object
          properties:
            status:
              type: string
              enum: [in_progress, completed]
            score:
              type: integer
            currentIndex:
              type: integer
            totalQuestions:
              type: integer
            nextQuestion:
              $ref: '#/components/schemas/QuizQuestion'
              nullable: true

    QuizResult:
      type: object
      properties:
        sessionId:
          type: string
        score:
          type: integer
        total:
          type: integer
        correctCount:
          type: integer
        wrongCount:
          type: integer
        accuracy:
          type: number
        rating:
          type: string
          enum: [excellent, good, keep_going]
          description: excellent≥90%, good≥70%, keep_going<70%（REQ-QUIZ-9）
        wrongCards:
          type: array
          items:
            type: object
            required: [cardId, lexemeId, en, userAnswer]
            properties:
              cardId:
                type: integer
                format: int64
              lexemeId:
                type: integer
                format: int64
              en:
                type: string
              cn:
                type: string
              userAnswer:
                type: string

    WordImageResponse:
      type: object
      required: [cardId, lexemeId, hasImage]
      properties:
        cardId:
          type: integer
          format: int64
        lexemeId:
          type: integer
          format: int64
        hasImage:
          type: boolean
        imageUrl:
          type: string
        storageKey:
          type: string
        transform:
          $ref: '#/components/schemas/ImageTransform'
        updatedAt:
          type: string
          format: date-time

    WordStainResponse:
      type: object
      required: [cardId, lexemeId, hidden]
      properties:
        cardId:
          type: integer
          format: int64
        lexemeId:
          type: integer
          format: int64
        hidden:
          type: boolean
        config:
          $ref: '#/components/schemas/StainConfig'
          nullable: true

    StainUpdateRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [regenerate, set_hidden, set_visible, replace]
        typeFilter:
          type: array
          items:
            type: string
            enum: [coffee, ink, highlight, crayon, random-line]
          nullable: true
        config:
          $ref: '#/components/schemas/StainConfig'

    StainBatchRequest:
      type: object
      properties:
        typeFilter:
          type: array
          items:
            type: string
          nullable: true

    StainBatchResponse:
      type: object
      properties:
        groupId:
          type: integer
        updatedCount:
          type: integer

    StatsSummary:
      type: object
      properties:
        masteredCount:
          type: integer
          description: 当前计划默写技能 FSRS stability >= 30 天的学习卡数
        streakDays:
          type: integer
        quizAccuracy:
          type: number
          description: 近 30 天测验正确率
        totalStudyDays:
          type: integer

    StatsHeatmap:
      type: object
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        days:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              level:
                type: integer
                minimum: 0
                maximum: 3

    AchievementsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              unlocked:
                type: boolean
              unlockedAt:
                type: string
                format: date-time
                nullable: true
